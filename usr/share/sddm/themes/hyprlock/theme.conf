[General]
# Background image, relative to this theme's Backgrounds/ directory.
# Synced by stow/hypr/.config/hypr/scripts/wallpaper.sh on every waypaper change.
background=current_wallpaper.png

# Avatar image, relative to the theme directory. Installed by setup from
# ~/.config/my/headshots/default.jpg.
avatar=Assets/avatar.jpg

# Catppuccin Mocha palette. Mirrors hyprlock's $text, $mauve, $base, $surface0,
# $red, $yellow.
colorText=#cdd6f4
colorAccent=#cba6f7
colorBase=#1e1e2e
colorSurface=#313244
colorRed=#f38ba8
colorYellow=#f9e2af

# Font family. Defaults to the hyprlock font.
fontFamily=JetBrainsMono Nerd Font
