# -----------------------------------------------------
# Layouts
# -----------------------------------------------------

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    # Commented out due to compatibility reasons
    # new_status = master
}

# Touchpad gestures (Hyprland 0.51+ new syntax).
# `workspace_swipe` is no longer a toggle — bind gestures explicitly here
# if you want them. Example: gesture = 3, horizontal, workspace

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}
