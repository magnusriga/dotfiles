# Start Listeners, e.g. for gtk theme switches.
exec-once = ~/.config/my/listeners.sh --startall

# Start Polkit (hyprpolkitagent replaces polkit-gnome)
exec-once = systemctl --user enable --now hyprpolkitagent.service

# Load Wallpaper (also starts waybar via wallpaper.sh post-command chain)
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh

# Load Notification Daemon
exec-once = swaync

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Using hypridle to start hyprlock
exec-once = hypridle

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh
