# Pavucontrol floating
windowrule = float on, match:class ^(.*org\.pulseaudio\.pavucontrol.*)$
windowrule = size 700 600, match:class ^(.*org\.pulseaudio\.pavucontrol.*)$
windowrule = center on, match:class ^(.*org\.pulseaudio\.pavucontrol.*)$
windowrule = pin on, match:class ^(.*org\.pulseaudio\.pavucontrol.*)$

# OpenAI ChatGPT floating
windowrule = float on, match:title ^(ChatGPT.*)$
windowrule = float on, match:title ^(.*chat\.openai\.com.*)$
windowrule = size 500 50%, match:title ^(.*chat\.openai\.com.*)$
windowrule = move 20 70, match:title ^(.*chat\.openai\.com.*)$

# Waypaper
windowrule = float on, match:class ^(.*waypaper.*)$
windowrule = size 900 700, match:class ^(.*waypaper.*)$
windowrule = center on, match:class ^(.*waypaper.*)$
windowrule = pin on, match:class ^(.*waypaper.*)$

# SwayNC
layerrule = blur on, match:namespace ^(swaync-control-center)$
layerrule = blur on, match:namespace ^(swaync-notification-window)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-control-center)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-notification-window)$

# Calendar floating
windowrule = float on, match:class ^(gnome-calendar)$
windowrule = move 100%-w-16 66, match:class ^(gnome-calendar)$
windowrule = pin on, match:class ^(gnome-calendar)$
windowrule = size 400 400, match:class ^(gnome-calendar)$

# Sidebar floating
windowrule = float on, match:class ^(com\.my\.sidebar)$
windowrule = move 100%-w-16 66, match:class ^(com\.my\.sidebar)$
windowrule = pin on, match:class ^(com\.my\.sidebar)$
windowrule = size 400 740, match:class ^(com\.my\.sidebar)$

# Gnome Control Center App floating
windowrule = float on, match:class ^(gnome-control-center)$
windowrule = size 800 600, match:class ^(gnome-control-center)$
windowrule = move 10% 20%, match:class ^(gnome-control-center)$

# Blueman Manager
windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 800 600, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# nwg-look
windowrule = float on, match:class ^(nwg-look)$
windowrule = size 700 600, match:class ^(nwg-look)$
windowrule = move 10% 20%, match:class ^(nwg-look)$
windowrule = pin on, match:class ^(nwg-look)$

# nwg-displays
windowrule = float on, match:class ^(nwg-displays)$
windowrule = size 900 600, match:class ^(nwg-displays)$
windowrule = move 10% 20%, match:class ^(nwg-displays)$
windowrule = pin on, match:class ^(nwg-displays)$

# System Mission Center
windowrule = float on, match:class ^(io\.missioncenter\.MissionCenter)$
windowrule = pin on, match:class ^(io\.missioncenter\.MissionCenter)$
windowrule = center on, match:class ^(io\.missioncenter\.MissionCenter)$
windowrule = size 900 600, match:class ^(io\.missioncenter\.MissionCenter)$

# System Mission Center Preference Window
windowrule = float on, match:class ^(missioncenter)$, match:title ^(Preferences)$
windowrule = pin on, match:class ^(missioncenter)$, match:title ^(Preferences)$
windowrule = center on, match:class ^(missioncenter)$, match:title ^(Preferences)$

# Gnome Calculator
windowrule = float on, match:class ^(org\.gnome\.Calculator)$
windowrule = size 700 600, match:class ^(org\.gnome\.Calculator)$
windowrule = center on, match:class ^(org\.gnome\.Calculator)$

# Emoji Picker Smile
windowrule = float on, match:class ^(it\.mijorus\.smile)$
windowrule = pin on, match:class ^(it\.mijorus\.smile)$
windowrule = move 100%-w-40 90, match:class ^(it\.mijorus\.smile)$

# Hyprland Share Picker
windowrule = float on, match:class ^(hyprland-share-picker)$
windowrule = pin on, match:class ^(hyprland-share-picker)$
windowrule = center on, match:class ^(hyprland-share-picker)$
windowrule = size 600 400, match:class ^(hyprland-share-picker)$

# Floating for Ghostty
windowrule = float on, match:class ^(my\.dotfiles\.floating)$
windowrule = size 1000 700, match:class ^(my\.dotfiles\.floating)$
windowrule = center on, match:class ^(my\.dotfiles\.floating)$
windowrule = pin on, match:class ^(my\.dotfiles\.floating)$

# Float and center file pickers
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$, match:title ^(Open.*Files?|Save.*Files?|All Files|Save)$
windowrule = center on, match:class ^(xdg-desktop-portal-gtk)$, match:title ^(Open.*Files?|Save.*Files?|All Files|Save)$

# Network Manager TUI (nmtui in Ghostty with a specific title)
windowrule = float on, match:class ^(com\.mitchellh\.ghostty)$, match:title ^(NetworkManager)$
windowrule = center on, match:class ^(com\.mitchellh\.ghostty)$, match:title ^(NetworkManager)$
windowrule = size 1100 700, match:class ^(com\.mitchellh\.ghostty)$, match:title ^(NetworkManager)$

# Suppress maximize events (apps you don't want auto-maximizing)
windowrule = suppress_event maximize, match:class .*

# Autoplace Whispering on workspace 4 (`silent` = don't steal focus)
windowrule = workspace 4 silent, match:class ^(Whispering)$

# Don't animate wofi
layerrule = no_anim on, match:namespace ^(wofi)$

# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK
env = GDK_SCALE,1

# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland

# Mozilla
env = MOZ_ENABLE_WAYLAND,1

# Set the cursor size for xcursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Ozone
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# XWayland
xwayland {
  force_zero_scaling = true
}

# HyprCapture (screenshot/recording plugin) — keybindings live in conf/keybindings/default.conf
plugin {
  hyprcapture {
    default_mode = region
    fullscreen_scope = all
    save = 1
    clipboard = 1
    show_thumbnail = 1
    save_dir = $HOME/Downloads/screenshots
    filename_template = screenshot-%Y%m%d-%H%M%S.png
    record_save_dir = $HOME/Downloads/screenshots
    record_filename_template = recording-%Y%m%d-%H%M%S.mp4
  }
}
